pre-commit:
  parallel: true
  commands:
    lint:
      glob: "src/**/*.ts"
      run: pnpm lint:fix
    format:
      glob: "src/**/*.ts"
      run: pnpm format

commit-msg:
  commands:
    conventional-commit:
      run: "grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\\(.+\\))?!?: .{1,100}' {1}"
      fail_text: "Commit message must follow Conventional Commits format.\nExample: feat(http): add DELETE route for medications\nTypes: feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert"

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reminder-api-local
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mvmayconsantos/reminder-api.git' # Ajustar para o seu repo
    targetRevision: HEAD
    path: infra/k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

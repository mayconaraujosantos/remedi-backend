services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ../observability/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector internal metrics
      - "8889:8889"   # Prometheus exporter metrics
    networks:
      - reminder_network
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - reminder_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Removido grafana-piechart-panel pois Pie Chart já é nativo e o plugin usa Angular (depreciado)
      - GF_INSTALL_PLUGINS=
      - GF_ANGULAR_SUPPORT_ENABLED=false
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - reminder_network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ../observability/loki-config.yml:/etc/loki/config.yml
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - reminder_network
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    user: root
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ../observability/tempo-config.yml:/etc/tempo/config.yml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - reminder_network
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

networks:
  reminder_network:
    name: reminder_network
    external: true
